# ============================================================
# Stage 1 Configuration: Direct Retrieval with MODIS 7 bands
# ============================================================
# Paper 3: PINN for Cloud Droplet Profile Retrieval
# Andrew J. Buggee, LASP / CU Boulder
#
# Usage:
#   python train.py --config configs/stage1_modis.yaml
# ============================================================

data:
  # Path to HDF5 training data (generated by notebook 01)
  # Update this path to your actual data location on Alpine
  h5_path: "/projects/$USER/paper3/data/libradtran_training_modis7.h5"
  train_frac: 0.8
  val_frac: 0.1
  num_workers: 4

model:
  n_wavelengths: 7          # MODIS first 7 bands
  n_geometry_inputs: 4      # SZA, VZA, relative azimuth, wind speed
  n_levels: 10              # Vertical levels in retrieved profile
  hidden_dims: [256, 256, 256, 256]
  dropout: 0.1
  activation: "gelu"

training:
  batch_size: 256
  n_epochs: 300
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 25
  scheduler_patience: 10

loss:
  # Physics loss weight (relative to supervised loss)
  # Start with a small value; increase if profiles are non-physical
  lambda_physics: 0.1
  # Individual physics term weights
  lambda_monotonicity: 1.0    # Penalize non-increasing profiles
  lambda_adiabatic: 0.5       # Penalize deviation from adiabatic shape
  lambda_smoothness: 0.1      # Penalize noisy profiles
