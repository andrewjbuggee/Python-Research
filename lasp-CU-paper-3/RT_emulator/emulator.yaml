# ============================================================
# ForwardModelEmulator Training Configuration
# ============================================================
# Paper 3: PINN for Cloud Droplet Profile Retrieval
# Andrew J. Buggee, LASP / CU Boulder
#
# Train the emulator INDEPENDENTLY before Stage 2:
#   python train_emulator.py --config emulator.yaml
#
# The emulator maps (r_e profile, tau_c, geometry, wv_above_cloud, wv_in_cloud) -> R(lambda).
# It is trained here, then frozen and plugged into the PINN loss.
#
# HySICS spectral range in this dataset: ~352 – 2297 nm, 636 channels
#   Best channels (easiest):  vis/NIR 500–800 nm — bright, smooth continuum
#   Worst channels (hardest): H2O absorption ~1380 nm & ~1900 nm — near-zero reflectance
#
# Accuracy gate
# -------------
# Training writes 'emulator_ready.pt' when val MRE < mre_target_pct.
# DO NOT use the emulator in Stage 2 until this file exists.
#
# Profile-held-out split
# ----------------------
# As of 12 April 2026, there are 91,648 spectra that come from only
# 73 droplet profiles from VOCALS-REx and 63 droplet profiles from ORACLES.
# profile_holdout: true reserves entire profiles for val/test so the
# test set contains cloud structures the model has NEVER seen.
# ============================================================

data:
  h5_path: "/Volumes/My Passport/neural_network_training_data/combined_vocals_oracles_training_data_12_April_2026.h5"
  instrument: "hysics"       # 'hysics' (0.3% noise) or 'emit' (4.0% noise)
  num_workers: 0             # must be 0 on MPS/Mac; safe to increase on Linux/CUDA
  seed: 42                   # must match retrieval network seed

  # --- Profile-held-out split (strongly recommended) ---
  profile_holdout: true
  n_val_profiles: 10          # profiles reserved for validation only
  n_test_profiles: 10         # profiles reserved for test (never seen in training)

  # --- Fallback sample-level split (only if profile_holdout: false) ---
  train_frac: 0.8
  val_frac: 0.1

  # --- Log-reflectance output mode ---
  # Targets are stored as log10(R + log_eps) before the loss.
  # Use plain MSELoss (not DWMSELoss) in this mode.
  # MRE is always reported in linear reflectance space.
  log_reflectance: true
  log_eps: 1.0e-6

  # --- ERA5 atmospheric input mode ---
  # false (default): use 2-scalar (wv_above_cloud, wv_in_cloud) approach.
  #   Set n_atm_inputs: 2 in the model section.
  # true: use full 37-level vapor concentration profile (n_atm_inputs: 37).
  #   Only helps if the dataset has sufficient vapor-profile diversity;
  #   with ~136 unique profiles it causes overfitting.
  use_era5_profile: false

  # --- PCA output decomposition ---
  # Predict N_PCA principal-component scores instead of 636 raw channels.
  # PCA is fit on training-set log10-reflectances at dataset load time.
  # Set n_pca_components in the model section to match.
  # 0  = disabled (predict all 636 channels directly)
  # 64 = captures >99% of log-reflectance variance, recommended
  n_pca_components: 64

  # --- Latin Hypercube augmentation (optional) ---
  # Leave as null until you have run libRadtran on LHC parameters.
  # To generate LHC parameters:
  #   from data import generate_lhc_parameters
  #   generate_lhc_parameters(n_samples=2000, output_path="lhc_params.h5")
  # Then run those parameters through libRadtran, add reflectances to the file,
  # and set lhc_h5_path to that file path.
  lhc_h5_path: null

model:
  n_levels: 10
  n_geometry_inputs: 4
  n_atm_inputs: 2           # 2-scalar ERA5 WV (use_era5_profile: false)
  n_wavelengths_out: 636
  n_pca_components: 64      # must match data.n_pca_components; 0 to disable
  # 512-wide residual MLP.  Input dim = 10 + 1 + 4 + 2 = 17.
  hidden_dims: [512, 512, 512, 512, 512]
  dropout: 0.05
  activation: "gelu"

training:
  batch_size: 256
  n_epochs: 1000
  learning_rate: 0.001
  weight_decay: 0.0001
  # Increased from 30 — DWMSE loss changes the convergence dynamics and needs
  # more room to find the optimum, especially for hard absorption-band channels.
  early_stopping_patience: 100

  # ReduceLROnPlateau scheduler
  # Halves the LR whenever val loss doesn't improve for scheduler_patience epochs.
  # More stable than cosine warm restarts for this problem.
  # patience=30 gives the model more room to benefit from each LR level before
  # dropping further — the previous run dropped 5 times in 134 epochs (too fast).
  scheduler_factor: 0.5
  scheduler_patience: 30
  scheduler_eta_min: 0.000001

  # Dual-Weighted MSE epsilon — only used when log_reflectance: false.
  dwmse_eps: 0.0001

  # Mean Relative Error target (%).
  # emulator_ready.pt is written when val MRE drops below this threshold.
  # 1.0% is the recommended minimum before using in Stage 2.
  mre_target_pct: 1.0

  # How often to compute full-dataset MRE (more expensive than MSE alone).
  # MRE is always computed at the final epoch regardless of this interval.
  mre_log_interval: 10
